<svg width="720" height="200" viewBox="0 0 720 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hive Corps logo</title>
  <desc id="desc">A geometric honey-gold hive mark beside a graphite Hive Corps wordmark.</desc>
  <defs>
    <linearGradient id="honey" x1="42" y1="34" x2="150" y2="166" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4C45A"/>
      <stop offset="0.52" stop-color="#D99A21"/>
      <stop offset="1" stop-color="#A96311"/>
    </linearGradient>
    <filter id="softShadow" x="18" y="22" width="154" height="156" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
